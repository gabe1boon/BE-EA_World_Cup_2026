name: Update leaderboard
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min, UTC
  workflow_dispatch:
  push:
    paths:
      - "config.py"           # auto-rebuild whenever assignments change
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build leaderboard
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python build.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json cache/ snapshots/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: leaderboard update $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3; do
            git push && break
            echo "Push attempt $i failed, pulling and retrying..."
            git pull --rebase
          done
