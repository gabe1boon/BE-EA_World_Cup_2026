<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026 Sweepstake</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>World Cup 2026 Sweepstake</h1>
    <p id="updated"></p>
  </header>

  <main>
    <div id="leaderboard-wrap">
      <p id="status" class="message">Loading...</p>
    </div>
  </main>

  <aside class="scoring-key">
    <h2>Scoring</h2>
    <ul>
      <li>Win <strong>+3</strong></li>
      <li>Draw <strong>+1</strong></li>
      <li>Goal <strong>+1</strong></li>
      <li>Clean sheet <strong>+2</strong></li>
      <li>Knockout round <strong>+5</strong></li>
      <li>Yellow card <strong class="yc">-1</strong></li>
      <li>Red card <strong class="rc">-2</strong></li>
    </ul>
  </aside>

  <script src="app.js"></script>
</body>
</html>
