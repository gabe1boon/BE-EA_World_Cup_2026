<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026 Sweepstake</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-left">
        <img src="BE-EA_logo.png" alt="BE-EA" class="logo">
        <div class="header-titles">
          <h1>World Cup 2026</h1>
          <p class="subtitle">BE-EA Sweepstake</p>
        </div>
      </div>
      <p id="updated"></p>
    </div>
  </header>

  <div class="scoring-bar">
    <span class="score-item">Win <strong>+3</strong></span>
    <span class="score-item">Draw <strong>+1</strong></span>
    <span class="score-item">Goal <strong>+1</strong></span>
    <span class="score-item">Clean sheet <strong>+2</strong></span>
    <span class="score-item">Knockout round <strong>+2</strong></span>
    <span class="score-item">Group upset <strong>+1/+3/+5</strong></span>
    <span class="score-item neg">Yellow card <strong>-1</strong></span>
    <span class="score-item neg">Red card <strong>-2</strong></span>
  </div>

  <main>
    <div class="search-wrap">
      <input id="search" type="search" placeholder="Search player or team..." autocomplete="off">
    </div>

    <div id="leaderboard-wrap">
      <p id="status" class="message">Loading...</p>
    </div>

    <div id="available-section"></div>
    <div id="upcoming-section"></div>
    <div id="fifa-section"></div>
  </main>

  <script src="app.js"></script>
  <script data-goatcounter="https://gboon.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
</body>
</html>
