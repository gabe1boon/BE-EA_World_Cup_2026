name: Update leaderboard

on:
  schedule:
    # Every 3 hours, UTC — well within the 100 req/day free tier
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build leaderboard
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python build.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json cache/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: leaderboard update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
